name: CI

on:
  workflow_dispatch:
    inputs:
      require_remote_binary_manifest:
        description: Verify release package template URL and checksum
        required: false
        type: boolean
        default: false
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**/*.md'
      - LICENSE.md
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - LICENSE.md

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Package
    runs-on: macos-15
    timeout-minutes: 45
    env:
      SWIFTPAGERKIT_DERIVED_DATA_ROOT: ${{ github.workspace }}/.build/xcode-cache/DerivedData
      SWIFTPAGERKIT_SOURCE_PACKAGES_DIR: ${{ github.workspace }}/.build/xcode-cache/SourcePackages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_PATH="$(/usr/bin/python3 <<'PY'
          import glob
          import re

          paths = glob.glob("/Applications/Xcode_26*.app")
          if not paths:
              raise SystemExit("No Xcode 26 installation found")

          def version(path):
              match = re.search(r"Xcode_([0-9.]+)\.app$", path)
              return tuple(int(part) for part in match.group(1).split(".")) if match else ()

          print(sorted(paths, key=version)[-1])
          PY
          )"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Export Xcode Cache Version
        run: echo "XCODE_CACHE_VERSION=xcode-$(xcodebuild -version | awk 'NR == 1 { print $2 }')" >> "$GITHUB_ENV"

      - name: Restore Xcode Build Cache
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-cache-${{ runner.os }}-${{ env.XCODE_CACHE_VERSION }}-${{ github.workflow }}-${{ github.sha }}
          restore-keys: |
            xcode-cache-${{ runner.os }}-${{ env.XCODE_CACHE_VERSION }}-${{ github.workflow }}-
            xcode-cache-${{ runner.os }}-${{ env.XCODE_CACHE_VERSION }}-
          deriveddata-directory: ${{ env.SWIFTPAGERKIT_DERIVED_DATA_ROOT }}
          sourcepackages-directory: ${{ env.SWIFTPAGERKIT_SOURCE_PACKAGES_DIR }}
          restore-mtime-targets: |
            .github/**/*
            Examples/**/*
            Package.swift
            Package.binary.swift
            Sources/**/*
            Tests/**/*
            scripts/**/*

      - name: Resolve iOS Simulator
        run: echo "SIMULATOR_ID=$(scripts/test/simulator.sh)" >> "$GITHUB_ENV"

      - name: SwiftPM Debug Smoke
        run: swift test

      - name: SwiftPM Release Smoke
        run: swift test -c release

      - name: iOS Binary Validation And UIKit Tests
        env:
          REQUIRE_REMOTE_BINARY_MANIFEST: ${{ github.event.inputs.require_remote_binary_manifest == 'true' && '1' || '0' }}
        run: scripts/test/binary.sh

      - name: Demo Runtime Validation
        run: scripts/test/demo.sh
