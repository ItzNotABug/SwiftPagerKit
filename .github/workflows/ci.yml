name: CI

on:
  workflow_dispatch:
    inputs:
      require_remote_binary_manifest:
        description: Verify release package template URL and checksum
        required: false
        type: boolean
        default: false
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - Package*.swift
      - Sources/**
      - Tests/**
      - scripts/**
      - Examples/SwiftPagerKitDemo/Config/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemo.xcodeproj/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemo.xcworkspace/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemo/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemoPackage/Package.swift
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemoPackage/Sources/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemoPackage/Tests/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemoUITests/**
      - .github/workflows/ci.yml
  push:
    branches:
      - main
    paths:
      - Package*.swift
      - Sources/**
      - Tests/**
      - scripts/**
      - Examples/SwiftPagerKitDemo/Config/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemo.xcodeproj/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemo.xcworkspace/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemo/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemoPackage/Package.swift
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemoPackage/Sources/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemoPackage/Tests/**
      - Examples/SwiftPagerKitDemo/SwiftPagerKitDemoUITests/**
      - .github/workflows/ci.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Package
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_PATH="$(/usr/bin/python3 <<'PY'
          import glob
          import re

          paths = glob.glob("/Applications/Xcode_26*.app")
          if not paths:
              raise SystemExit("No Xcode 26 installation found")

          def version(path):
              match = re.search(r"Xcode_([0-9.]+)\.app$", path)
              return tuple(int(part) for part in match.group(1).split(".")) if match else ()

          print(sorted(paths, key=version)[-1])
          PY
          )"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Resolve iOS Simulator
        run: echo "SIMULATOR_ID=$(scripts/test/simulator.sh)" >> "$GITHUB_ENV"

      - name: SwiftPM Debug Smoke
        run: swift test

      - name: SwiftPM Release Smoke
        run: swift test -c release

      - name: iOS Binary Validation And UIKit Tests
        env:
          REQUIRE_REMOTE_BINARY_MANIFEST: ${{ github.event.inputs.require_remote_binary_manifest == 'true' && '1' || '0' }}
        run: scripts/test/binary.sh

      - name: Demo Runtime Validation
        run: scripts/test/demo.sh
